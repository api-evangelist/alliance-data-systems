apis:
  - name: Bread Pay Platform API
    description: >-
      Next-generation BreadPay Platform REST API for managing buyers, merchant
      accounts, payment options, transaction lifecycle (authorize, cancel,
      capture, refund), and payment-product servicing. Hosted at
      api.platform.breadpayments.com with a preview environment at
      api-preview.platform.breadpayments.com. Authentication is OAuth 2.0
      Client Credentials Flow with credentials issued from the Bread Merchant
      Portal.
    humanURL: https://platform-docs.breadpayments.com/bread-developers
    baseURL: https://api.platform.breadpayments.com/api
    tags:
      - Buy Now Pay Later
      - BNPL
      - Payments
      - Transactions
      - Buyers
      - Merchants
    properties:
      - type: Documentation
        url: https://platform-docs.breadpayments.com/bread-developers
      - type: Concepts
        url: https://platform-docs.breadpayments.com/bread-developers/docs
      - type: Authentication
        url: https://platform-docs.breadpayments.com/bread-developers/docs/api-access
      - type: APIReference
        url: https://platform-docs.breadpayments.com/bread-developers/reference
      - type: OpenAPI
        url: openapi/bread-pay-platform-openapi.yml
      - type: SandboxBaseURL
        url: https://api-preview.platform.breadpayments.com/api
      - type: ProductionBaseURL
        url: https://api.platform.breadpayments.com/api
      - type: Capability
        url: capabilities/bread-pay-platform-transactions.yaml
      - type: Capability
        url: capabilities/bread-pay-platform-buyers.yaml
  - name: Bread Classic Merchant API
    description: >-
      Legacy "bread-classic" REST API for managing Bread checkout transactions,
      carts, shipping (carrier + tracking) and capture/refund/cancel actions
      from the original Bread BNPL product, still documented at
      docs.breadpayments.com for merchants on the prior integration. The
      Merchant API helps manage completed transactions and carts, which can
      also be created directly in the browser via the Bread JavaScript SDK.
    humanURL: https://docs.breadpayments.com/bread-classic/reference/getting-started-with-your-api
    baseURL: https://api.breadpayments.com
    tags:
      - Buy Now Pay Later
      - BNPL
      - Merchant
      - Transactions
      - Carts
      - Shipping
      - Legacy
    properties:
      - type: Documentation
        url: https://docs.breadpayments.com/bread-classic/reference
      - type: GettingStarted
        url: https://docs.breadpayments.com/bread-classic/reference/getting-started-with-your-api
      - type: Checkout
        url: https://docs.breadpayments.com/bread-classic/docs/bread-checkout
      - type: Testing
        url: https://docs.breadpayments.com/bread-classic/docs/testing-bread
      - type: ManagingTransactions
        url: https://docs.breadpayments.com/bread-classic/docs/managing-bread-transactions
      - type: OpenAPI
        url: openapi/bread-classic-merchant-openapi.yml
      - type: Capability
        url: capabilities/bread-classic-transactions.yaml
  - name: Bread JavaScript SDK
    description: >-
      Browser-side JavaScript SDK that exposes the BreadPayments object for
      rendering the Bread modal, embedded placements, prequalification, and
      cart/checkout flows on merchant sites. Loaded from Bread CDNs in preview
      and production environments and initialized with a merchant
      integrationKey plus buyer object.
    humanURL: https://platform-docs.breadpayments.com/bread-onboarding/docs/bread-sdk-installation
    baseURL: https://connect.breadpayments.com
    tags:
      - SDK
      - JavaScript
      - Web
      - Checkout
      - Placements
      - Prequalification
    properties:
      - type: Documentation
        url: https://platform-docs.breadpayments.com/bread-onboarding/docs/bread-sdk-installation
      - type: PreviewCDN
        url: https://connect-preview.breadpayments.com/sdk.js
      - type: ProductionCDN
        url: https://connect.breadpayments.com/sdk.js
      - type: UnifiedSDKOverview
        url: https://platform-docs.breadpayments.com/bread-onboarding/docs/unified-sdk-overview
  - name: Bread Financial Brand Partners iOS SDK
    description: >-
      Official Bread Financial mobile SDK for iOS published as
      breadfinancial-brand-partners-ios on the bppub GitHub organization.
      Provides batch prescreen, unified prequalification, placement rendering,
      application callbacks, and customer status events for native iOS apps.
    humanURL: https://github.com/bppub/breadfinancial-brand-partners-ios
    baseURL: https://github.com/bppub
    tags:
      - SDK
      - Mobile
      - iOS
      - Swift
      - Prequalification
      - Placements
    properties:
      - type: Repository
        url: https://github.com/bppub/breadfinancial-brand-partners-ios
      - type: AlternateSwiftRepo
        url: https://github.com/bppub/breadfinancial-brand-partners-ios-swift
      - type: Documentation
        url: https://platform-docs.breadpayments.com/bread-onboarding
  - name: Bread Financial Brand Partners Android SDK
    description: >-
      Official Bread Financial mobile SDK for Android (Kotlin) published as
      breadfinancial-brand-partners-android on the bppub GitHub organization.
      Provides batch prescreen, unified prequalification, placement rendering,
