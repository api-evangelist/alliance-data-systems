description: >-
  Alliance Data Systems Corporation (ADS) was a Plano/Columbus-based financial
  and marketing services holding company built in 1996 from the merger of J.C.
  Penney's credit card processing unit and The Limited's World Financial Network
  National Bank, taken public on the NYSE in 2001. The company historically
  operated three segments — Card Services (private label and co-brand retail
  credit cards), Epsilon (data-driven marketing and CRM), and LoyaltyOne (the
  AIR MILES Reward Program in Canada and BrandLoyalty in the Netherlands). In
  July 2019 ADS sold Epsilon to Publicis Groupe for $4.4 billion. In December
  2020 ADS acquired Bread, a New York-based BNPL platform, for $450 million.
  In November 2021 ADS spun off LoyaltyOne as Loyalty Ventures Inc. (LTRN). On
  March 23, 2022 the remaining card-and-payments business rebranded as Bread
  Financial Holdings, Inc., with the common stock starting to trade on NYSE
  under the new ticker BFH on April 4, 2022. Today Bread Financial is a
  tech-forward financial services company headquartered in Columbus, Ohio
  (Wikipedia 2024 figures&#58; $3.84B revenue, ~6,000 employees, $22.9B total
  assets, 135+ managed card programs across partners including Victoria's
  Secret, Wayfair, Williams-Sonoma, Academy Sports, HP, PlayStation, and the
  Crypto.com Visa Card). The developer surface lives under the Bread Pay BNPL
  brand at developer-facing properties docs.breadpayments.com (legacy
  "bread-classic" Merchant API) and platform-docs.breadpayments.com
  (next-generation "BreadPay Platform" APIs, OAuth 2.0 Client Credentials,
  hosted on https://api.platform.breadpayments.com/api), plus a JavaScript
  Bread SDK (preview + production CDN), iOS/Android mobile SDKs published as
  the Bread Financial Brand Partners SDKs on github.com/bppub, and platform
  integrations for Shopify, Magento 2, WooCommerce, BigCommerce, Salesforce
  Commerce Cloud, Miva, Volusion, and Turbify. The corporate/holding side
  (private-label and co-brand cards issued through Comenity Bank and Comenity
  Capital Bank, plus high-yield savings, CDs, IRAs, and personal loans) is
  delivered through B2B partner integrations rather than a public developer
  portal.
