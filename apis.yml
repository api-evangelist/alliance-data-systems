    description: >-
      Outbound webhook system for the BreadPay Platform that notifies merchant
      systems of transaction lifecycle events. Documented under the BreadPay
      developer site with setup, concepts, validation, and client
      implementation guides.
    humanURL: https://platform-docs.breadpayments.com/bread-developers/docs
    baseURL: https://platform-docs.breadpayments.com/bread-developers/docs
    tags:
      - Webhooks
      - Events
      - Transactions
      - Eventing
    properties:
      - type: Documentation
        url: https://platform-docs.breadpayments.com/bread-developers/docs
